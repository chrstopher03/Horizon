<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito</title>
        <link rel="icon" href="1.jpeg">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f5f5;
color:#111;
}

/* HEADER */
.header{
position:sticky;
top:0;
z-index:100;
padding:20px;
text-align:center;
font-size:22px;
font-weight:700;
background:#fff;
border-bottom:1px solid #e5e5e5;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

/* LISTA */
#items{
padding:20px;
max-width:900px;
margin:auto;
}

/* CARD */
.card{
background:#fff;
border:1px solid #ececec;
border-radius:18px;
padding:18px;
margin-bottom:18px;
display:flex;
justify-content:space-between;
align-items:center;
transition:.3s;
animation:fade .35s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.left img{
width:80px;
height:80px;
object-fit:cover;
background:#f3f3f3;
border-radius:14px;
border:1px solid #e8e8e8;
padding:6px;
transition:.3s;
}

.left img:hover{
transform:scale(1.05);
}

.name{
font-size:17px;
font-weight:700;
margin-bottom:6px;
color:#111;
}

.price{
font-size:14px;
color:#666;
}

/* CANTIDAD */

.qty{
margin-top:12px;
display:flex;
align-items:center;
gap:12px;
}

.qty button{
width:34px;
height:34px;
border:none;
border-radius:50%;
background:#111;
color:#fff;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.qty button:hover{
background:#333;
transform:scale(1.08);
}

.qty span{
font-size:16px;
font-weight:600;
min-width:20px;
text-align:center;
}

/* DERECHA */

.right{
display:flex;
flex-direction:column;
align-items:flex-end;
gap:12px;
}

.subtotal{
font-size:18px;
font-weight:700;
color:#111;
}

.delete{
width:40px;
height:40px;
border:none;
border-radius:50%;
background:#111;
color:#fff;
cursor:pointer;
transition:.3s;
}

.delete:hover{
background:#000;
transform:scale(1.08);
}

/* TOTAL */

.total{
position:sticky;
bottom:0;
background:#fff;
border-top:1px solid #e5e5e5;
padding:20px;
font-size:24px;
font-weight:700;
text-align:center;
box-shadow:0 -4px 15px rgba(0,0,0,.08);
}

/* BOTONES */

.actions{
max-width:900px;
margin:20px auto;
padding:0 20px 30px;
display:flex;
flex-direction:column;
gap:15px;
}

.btn{
padding:15px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.whatsapp{
background:#111;
color:#fff;
}

.whatsapp:hover{
background:#000;
transform:translateY(-2px);
}

.clear{
background:#e6e6e6;
color:#111;
}

.clear:hover{
background:#d5d5d5;
}

.back{
background:#fff;
color:#111;
border:2px solid #111;
}

.back:hover{
background:#111;
color:#fff;
}

/* TOAST */

.toast{
position:fixed;
left:50%;
bottom:90px;
transform:translateX(-50%) translateY(20px);
background:#111;
color:#fff;
padding:14px 24px;
border-radius:40px;
font-size:14px;
opacity:0;
transition:.35s;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

.empty{
text-align:center;
padding:80px 20px;
font-size:18px;
color:#777;
}

/* RESPONSIVE */

@media(max-width:650px){

.card{
padding:15px;
}

.left img{
width:70px;
height:70px;
}

.name{
font-size:16px;
}

.subtotal{
font-size:16px;
}

.total{
font-size:22px;
}

}
.container{
max-width:900px;
margin:auto;
padding:20px;
}

.header{
position:sticky;
top:0;
background:#fff;
display:flex;
align-items:center;
gap:15px;
padding:18px 20px;
border-bottom:1px solid #e5e5e5;
z-index:100;
}

.back-header{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:#111;
color:#fff;
cursor:pointer;
font-size:18px;
transition:.3s;
}

.back-header:hover{
transform:scale(1.08);
}

.header-center h2{
margin:0;
font-size:22px;
}

.header-center span{
font-size:13px;
color:#666;
}

.summary{
margin:25px 0;
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.summary-row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
font-size:15px;
}

.summary-row:last-child{
border:none;
}

.total-row{
font-size:20px;
font-weight:bold;
}

.actions{
display:flex;
flex-direction:column;
gap:15px;
margin-top:25px;
}

.size{
    font-size:13px;
    color:#666;
    margin:4px 0;
}
</style>
</head>
<body>

<header class="header">

    <button class="back-header" onclick="goBack()">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

    <div class="header-center">
        <h2>Mi carrito</h2>
        <span id="cartCount">0 productos</span>
    </div>

</header>

<main class="container">

    <div id="items"></div>

    <div class="summary">

        <div class="summary-row">
            <span>Productos</span>
            <span id="totalProductos">0</span>
        </div>

        <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">C$ 0</span>
        </div>

        <div class="summary-row">
            <span>Envío</span>
            <span>Gratis</span>
        </div>

        <div class="summary-row total-row">
            <span>Total</span>
            <span id="total">C$ 0</span>
        </div>

    </div>

    <div class="actions">

        <button class="btn whatsapp" onclick="enviarWhatsApp()">
            <i class="fa-brands fa-whatsapp"></i>
            Finalizar pedido
        </button>

        <button class="btn clear" onclick="vaciarCarrito()">
            <i class="fa-solid fa-trash"></i>
            Vaciar carrito
        </button>

        <button class="btn back" onclick="goBack()">
            <i class="fa-solid fa-bag-shopping"></i>
            Seguir comprando
        </button>

    </div>

</main>

<div id="toast" class="toast"></div>

</body><script>

function showToast(msg){
    const t=document.getElementById("toast");
    t.innerText=msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2000);
}

/* CARGAR CARRITO */

function loadCart(){

    const cart=JSON.parse(localStorage.getItem("cart"))||[];

    let html="";
    let total=0;
    let cantidadProductos=0;

    if(cart.length===0){

        items.innerHTML="<p class='empty'>Tu carrito está vacío</p>";

        document.getElementById("cartCount").innerText="0 productos";
        document.getElementById("totalProductos").innerText="0";
        document.getElementById("subtotal").innerText="C$ 0";
        document.getElementById("total").innerText="C$ 0";

        return;
    }

    cart.forEach((p,i)=>{

        const name=p.name||"Producto";
        const price=Number(p.price)||0;
        const qty=Number(p.qty)||1;
        const img=p.img||"";
        const size=p.size||"";

        const subtotal=price*qty;

        total+=subtotal;
        cantidadProductos+=qty;

        html+=`
        <div class="card">

            <div class="left">

                <img src="${img}">

                <div>

                    <div class="name">${name}</div>

                    ${size ? `<div class="size">Talla: <b>${size}</b></div>` : ""}

                    <div class="price">C$ ${price}</div>

                    <div class="qty">

                        <button onclick="changeQty(${i},-1)">-</button>

                        <span>${qty}</span>

                        <button onclick="changeQty(${i},1)">+</button>

                    </div>

                </div>

            </div>

            <div class="right">

                <div class="subtotal">C$ ${subtotal}</div>

                <button class="delete" onclick="removeItem(${i})">
                    <i class="fa fa-trash"></i>
                </button>

            </div>

        </div>
        `;

    });

    items.innerHTML=html;

    document.getElementById("cartCount").innerText=
        cantidadProductos+(cantidadProductos==1?" producto":" productos");

    document.getElementById("totalProductos").innerText=cantidadProductos;

    document.getElementById("subtotal").innerText="C$ "+total;

    document.getElementById("total").innerText="C$ "+total;

}

/* CAMBIAR CANTIDAD */

function changeQty(i,val){

    let cart=JSON.parse(localStorage.getItem("cart"))||[];

    if(!cart[i]) return;

    cart[i].qty+=val;

    if(cart[i].qty<=0){

        cart.splice(i,1);

        showToast("Producto eliminado");

    }

    localStorage.setItem("cart",JSON.stringify(cart));

    loadCart();

}

/* ELIMINAR PRODUCTO */

function removeItem(i){

    let cart=JSON.parse(localStorage.getItem("cart"))||[];

    cart.splice(i,1);

    localStorage.setItem("cart",JSON.stringify(cart));

    loadCart();

    showToast("Producto eliminado");

}

/* VACIAR */

function vaciarCarrito(){

    localStorage.removeItem("cart");

    loadCart();

    showToast("Carrito vacío");

}

/* VOLVER */

function goBack(){

    location.href="index.html";

}

/* ENVIAR A WHATSAPP */

function enviarWhatsApp(){

    const cart=JSON.parse(localStorage.getItem("cart"))||[];

    if(cart.length===0){

        showToast("Carrito vacío");

        return;

    }

    let total=0;

    let mensaje="🛍️ *Pedido HORIZON*\n\n";

    mensaje+="📅 "+new Date().toLocaleDateString()+"\n";
    mensaje+="🕒 "+new Date().toLocaleTimeString()+"\n\n";

    cart.forEach((p,index)=>{

        const subtotal=p.price*p.qty;

        total+=subtotal;

        mensaje+=`${index+1}. ${p.name}\n`;

        if(p.size){

            mensaje+=`📏 Talla: ${p.size}\n`;

        }

        mensaje+=`Cantidad: ${p.qty}\n`;
        mensaje+=`Precio: C$${p.price}\n`;
        mensaje+=`Subtotal: C$${subtotal}\n\n`;

    });

    mensaje+="━━━━━━━━━━━━━━\n";
    mensaje+=`💰 TOTAL: C$${total}`;

    window.open(
        "https://wa.me/50582338032?text="+encodeURIComponent(mensaje),
        "_blank"
    );

}

/* VARIABLES */

const items=document.getElementById("items");

/* INICIAR */

loadCart();

</script>

</body>
</html>
